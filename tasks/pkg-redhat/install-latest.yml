---
- name: pkg-redhat | install-latest | Install latest datadog-agent package (dnf)
  ansible.builtin.dnf:
    name: "{{ datadog_agent_flavor }}"
    update_cache: true
    state: latest # noqa package-latest
  register: agent_datadog_agent_install
  when: not ansible_check_mode and ansible_facts['pkg_mgr'] in ["dnf", "dnf5"]
  notify: Restart datadog-agent

- name: pkg-redhat | install-latest | Install latest datadog-agent package (yum)
  ansible.builtin.dnf:
    name: "{{ datadog_agent_flavor }}"
    update_cache: true
    state: latest # noqa package-latest
  register: agent_datadog_agent_install
  when: not ansible_check_mode and ansible_facts['pkg_mgr'] == "yum"
  notify: Restart datadog-agent
